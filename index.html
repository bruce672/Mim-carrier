<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIM Travel & Tours \u2014 Discover the World</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #C9A84C;
    --gold-light: #E8C96D;
    --gold-pale: #F5EDD8;
    --navy: #0F1E3C;
    --navy-mid: #1A2F5A;
    --cream: #FDFAF4;
    --slate: #4A5568;
    --white: #FFFFFF;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--navy);
    overflow-x: hidden;
  }

  /* \u2500\u2500 NAV \u2500\u2500 */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 60px;
    background: rgba(15,30,60,0.96);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(201,168,76,0.25);
  }
  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px; font-weight: 600;
    color: var(--gold);
    letter-spacing: 2px;
    text-decoration: none;
  }
  .nav-logo span { color: var(--white); font-weight: 300; }
  .nav-links { display: flex; gap: 36px; list-style: none; }
  .nav-links a {
    color: rgba(255,255,255,0.75);
    text-decoration: none; font-size: 13px;
    letter-spacing: 1.5px; text-transform: uppercase;
    transition: color 0.3s;
  }
  .nav-links a:hover { color: var(--gold); }
  .nav-cta {
    background: var(--gold); color: var(--navy);
    padding: 10px 24px; border-radius: 2px;
    font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase;
    font-weight: 500; text-decoration: none;
    transition: background 0.3s, transform 0.2s;
  }
  .nav-cta:hover { background: var(--gold-light); transform: translateY(-1px); }

  /* \u2500\u2500 HERO \u2500\u2500 */
  .hero {
    min-height: 100vh;
    background: linear-gradient(135deg, #0F1E3C 0%, #1A2F5A 50%, #0D2247 100%);
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    position: relative; overflow: hidden;
    padding: 120px 40px 80px;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 60%, rgba(201,168,76,0.08) 0%, transparent 70%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23C9A84C' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .hero-badge {
    display: inline-block;
    border: 1px solid rgba(201,168,76,0.5);
    color: var(--gold);
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    padding: 8px 20px; margin-bottom: 28px;
    animation: fadeInDown 0.8s ease both;
  }
  .hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(52px, 8vw, 96px);
    font-weight: 300; line-height: 1.05;
    color: var(--white);
    margin-bottom: 12px;
    animation: fadeInUp 0.9s 0.1s ease both;
  }
  .hero h1 em { color: var(--gold); font-style: italic; }
  .hero-sub {
    font-size: 16px; color: rgba(255,255,255,0.55);
    margin-bottom: 48px; letter-spacing: 0.5px; line-height: 1.7;
    max-width: 480px; margin-left: auto; margin-right: auto;
    animation: fadeInUp 1s 0.2s ease both;
  }
  .hero-btns {
    display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
    animation: fadeInUp 1s 0.3s ease both;
  }
  .btn-primary {
    background: var(--gold); color: var(--navy);
    padding: 16px 40px; font-size: 13px;
    letter-spacing: 2px; text-transform: uppercase; font-weight: 500;
    text-decoration: none; border-radius: 2px;
    transition: all 0.3s;
  }
  .btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); }
  .btn-secondary {
    border: 1px solid rgba(255,255,255,0.3); color: var(--white);
    padding: 16px 40px; font-size: 13px;
    letter-spacing: 2px; text-transform: uppercase;
    text-decoration: none; border-radius: 2px;
    transition: all 0.3s;
  }
  .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }

  .hero-scroll {
    position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    color: rgba(255,255,255,0.35); font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    animation: pulse 2s infinite;
  }
  .scroll-line {
    width: 1px; height: 40px;
    background: linear-gradient(to bottom, rgba(201,168,76,0.6), transparent);
  }

  /* \u2500\u2500 DESTINATIONS \u2500\u2500 */
  .section { padding: 100px 60px; }
  .section-label {
    font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 16px;
  }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(38px, 5vw, 56px); font-weight: 300;
    line-height: 1.1; color: var(--navy);
    max-width: 560px;
  }
  .section-title em { font-style: italic; color: var(--gold); }

  .destinations { background: var(--cream); }
  .dest-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 60px; flex-wrap: wrap; gap: 24px;
  }
  .dest-grid {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    grid-template-rows: 280px 280px;
    gap: 16px;
  }
  .dest-card {
    position: relative; overflow: hidden; border-radius: 4px;
    cursor: pointer;
  }
  .dest-card:first-child { grid-row: 1 / 3; }
  .dest-bg {
    width: 100%; height: 100%;
    transition: transform 0.6s ease;
  }
  .dest-card:hover .dest-bg { transform: scale(1.05); }
  .dest-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(15,30,60,0.85) 0%, rgba(15,30,60,0.1) 60%);
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 28px;
  }
  .dest-country {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 6px;
  }
  .dest-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px; font-weight: 300; color: var(--white);
    line-height: 1.2;
  }
  .dest-card:first-child .dest-name { font-size: 42px; }
  .dest-tag {
    display: inline-block; margin-top: 10px;
    background: rgba(201,168,76,0.2); border: 1px solid rgba(201,168,76,0.4);
    color: var(--gold); font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; padding: 5px 12px; border-radius: 20px;
  }

  /* Destination color-coded backgrounds */
  .dest-dhaka { background: linear-gradient(135deg, #1a3a2a, #2d5a3d, #1a3a2a); }
  .dest-maldives { background: linear-gradient(135deg, #006994, #00a8cc, #0077b6); }
  .dest-thailand { background: linear-gradient(135deg, #8B3A3A, #C44D58, #8B3A3A); }
  .dest-dubai { background: linear-gradient(135deg, #8B6914, #C9A84C, #8B6914); }
  .dest-europe { background: linear-gradient(135deg, #2C3E7A, #4A62B3, #2C3E7A); }

  .dest-pattern {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 80px; opacity: 0.15;
  }
  .dest-card:first-child .dest-pattern { font-size: 140px; }

  /* \u2500\u2500 SERVICES \u2500\u2500 */
  .services { background: var(--navy); padding: 100px 60px; }
  .services .section-title { color: var(--white); }
  .services .section-label { margin-bottom: 16px; }
  .services-intro { color: rgba(255,255,255,0.5); font-size: 15px; line-height: 1.7; max-width: 400px; }
  .services-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 70px; gap: 40px; flex-wrap: wrap;
  }
  .services-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px;
  }
  .service-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,168,76,0.1);
    padding: 48px 36px;
    transition: all 0.3s;
    position: relative; overflow: hidden;
  }
  .service-card::before {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
    background: var(--gold);
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.4s ease;
  }
  .service-card:hover { background: rgba(201,168,76,0.05); border-color: rgba(201,168,76,0.25); }
  .service-card:hover::before { transform: scaleX(1); }
  .service-icon {
    width: 52px; height: 52px;
    border: 1px solid rgba(201,168,76,0.35);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 28px; font-size: 22px;
    border-radius: 2px;
  }
  .service-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 400; color: var(--white);
    margin-bottom: 14px;
  }
  .service-desc { color: rgba(255,255,255,0.45); font-size: 14px; line-height: 1.7; }

  /* \u2500\u2500 ABOUT / AGENT \u2500\u2500 */
  .about { background: var(--gold-pale); padding: 100px 60px; }
  .about-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center;
  }
  .about-visual {
    position: relative;
  }
  .about-card {
    background: var(--navy);
    padding: 52px;
    border-radius: 4px;
    position: relative;
  }
  .about-card::before {
    content: '';
    position: absolute; top: -16px; right: -16px;
    width: 100%; height: 100%;
    border: 2px solid var(--gold);
    border-radius: 4px; z-index: -1;
  }
  .about-avatar {
    width: 80px; height: 80px; border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px; color: var(--navy); font-weight: 600;
    margin-bottom: 24px;
  }
  .about-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px; color: var(--white); font-weight: 400;
    margin-bottom: 4px;
  }
  .about-role { color: var(--gold); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 24px; }
  .about-divider { height: 1px; background: rgba(255,255,255,0.1); margin: 24px 0; }
  .about-info { display: flex; flex-direction: column; gap: 12px; }
  .info-row { display: flex; justify-content: space-between; }
  .info-label { color: rgba(255,255,255,0.4); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }
  .info-val { color: var(--white); font-size: 13px; }
  .about-skills {
    display: flex; flex-wrap: wrap; gap: 8px; margin-top: 24px;
  }
  .skill-chip {
    background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold); font-size: 11px; padding: 5px 12px; border-radius: 20px;
    letter-spacing: 0.5px;
  }

  .about-text .section-label { margin-bottom: 16px; }
  .about-text .section-title { margin-bottom: 24px; }
  .about-desc {
    color: var(--slate); font-size: 15px; line-height: 1.8;
    margin-bottom: 20px;
  }
  .about-stats {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 48px;
  }
  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 44px; font-weight: 300; color: var(--navy); line-height: 1;
  }
  .stat-num span { color: var(--gold); }
  .stat-label { font-size: 12px; color: var(--slate); letter-spacing: 1px; text-transform: uppercase; margin-top: 6px; }

  /* \u2500\u2500 PACKAGES \u2500\u2500 */
  .packages { padding: 100px 60px; background: var(--cream); }
  .pkg-header { text-align: center; margin-bottom: 64px; }
  .pkg-header .section-title { margin: 0 auto 16px; text-align: center; }
  .pkg-header .section-label { text-align: center; }
  .pkg-sub { color: var(--slate); font-size: 15px; max-width: 480px; margin: 0 auto; line-height: 1.7; }
  .pkg-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .pkg-card {
    border: 1px solid rgba(15,30,60,0.1); border-radius: 4px;
    overflow: hidden; transition: all 0.3s; background: var(--white);
  }
  .pkg-card:hover { transform: translateY(-6px); box-shadow: 0 20px 60px rgba(15,30,60,0.12); }
  .pkg-card.featured { border-color: var(--gold); position: relative; }
  .pkg-card.featured::before {
    content: 'MOST POPULAR';
    position: absolute; top: 18px; right: 18px;
    background: var(--gold); color: var(--navy);
    font-size: 9px; letter-spacing: 2px; padding: 5px 10px; border-radius: 20px;
  }
  .pkg-img {
    height: 200px; display: flex; align-items: center; justify-content: center;
    font-size: 64px;
  }
  .pkg-img-beach { background: linear-gradient(135deg, #006994, #0096c7, #48cae4); }
  .pkg-img-city { background: linear-gradient(135deg, #370617, #e85d04, #f48c06); }
  .pkg-img-nature { background: linear-gradient(135deg, #1b4332, #2d6a4f, #40916c); }
  .pkg-body { padding: 32px 28px; }
  .pkg-dest { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
  .pkg-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px; font-weight: 400; color: var(--navy); margin-bottom: 12px;
  }
  .pkg-desc { font-size: 13px; color: var(--slate); line-height: 1.6; margin-bottom: 24px; }
  .pkg-details { display: flex; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }
  .pkg-detail { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--slate); }
  .pkg-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 20px; border-top: 1px solid rgba(15,30,60,0.08);
  }
  .pkg-price { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 400; color: var(--navy); }
  .pkg-price small { font-size: 13px; color: var(--slate); font-family: 'DM Sans', sans-serif; }
  .pkg-btn {
    background: var(--navy); color: var(--white);
    padding: 10px 22px; font-size: 11px; letter-spacing: 1.5px;
    text-transform: uppercase; text-decoration: none; border-radius: 2px;
    transition: all 0.3s;
  }
  .pkg-btn:hover, .pkg-card.featured .pkg-btn { background: var(--gold); color: var(--navy); }

  /* \u2500\u2500 CONTACT \u2500\u2500 */
  .contact { background: var(--navy); padding: 100px 60px; }
  .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }
  .contact .section-title { color: var(--white); margin-bottom: 24px; }
  .contact-desc { color: rgba(255,255,255,0.5); font-size: 15px; line-height: 1.7; margin-bottom: 48px; }
  .contact-items { display: flex; flex-direction: column; gap: 24px; }
  .contact-item { display: flex; gap: 18px; align-items: flex-start; }
  .c-icon {
    width: 44px; height: 44px; flex-shrink: 0;
    border: 1px solid rgba(201,168,76,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; border-radius: 2px;
  }
  .c-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
  .c-val { color: rgba(255,255,255,0.75); font-size: 15px; }

  .contact-form { display: flex; flex-direction: column; gap: 16px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 8px; }
  .form-group label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.45); }
  .form-group input,
  .form-group select,
  .form-group textarea {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--white); padding: 14px 18px; font-size: 14px;
    font-family: 'DM Sans', sans-serif; border-radius: 2px;
    outline: none; transition: border-color 0.3s;
    appearance: none;
  }
  .form-group input::placeholder,
  .form-group textarea::placeholder { color: rgba(255,255,255,0.25); }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: rgba(201,168,76,0.6); }
  .form-group textarea { resize: vertical; min-height: 110px; }
  .form-group select option { background: var(--navy); }
  .form-submit {
    background: var(--gold); color: var(--navy);
    padding: 16px 40px; font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
    font-weight: 500; border: none; border-radius: 2px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: all 0.3s;
    align-self: flex-start;
  }
  .form-submit:hover { background: var(--gold-light); transform: translateY(-2px); }

  /* \u2500\u2500 FOOTER \u2500\u2500 */
  footer {
    background: #080E1E; padding: 60px;
    border-top: 1px solid rgba(201,168,76,0.15);
  }
  .footer-grid {
    display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 60px; margin-bottom: 48px;
  }
  .footer-brand .nav-logo { font-size: 22px; margin-bottom: 16px; display: block; }
  .footer-brand p { color: rgba(255,255,255,0.4); font-size: 13px; line-height: 1.7; max-width: 260px; }
  .footer-col h4 {
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 20px;
  }
  .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .footer-col ul li a { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 13px; transition: color 0.3s; }
  .footer-col ul li a:hover { color: var(--gold); }
  .footer-bottom {
    border-top: 1px solid rgba(255,255,255,0.06); padding-top: 28px;
    display: flex; justify-content: space-between; align-items: center;
    color: rgba(255,255,255,0.3); font-size: 12px;
  }

  /* \u2500\u2500 ANIMATIONS \u2500\u2500 */
  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.35; }
    50% { opacity: 0.8; }
  }

  /* \u2500\u2500 RESPONSIVE \u2500\u2500 */
  @media (max-width: 900px) {
    nav { padding: 16px 24px; }
    .nav-links { display: none; }
    .section { padding: 70px 24px; }
    .dest-grid { grid-template-columns: 1fr 1fr; grid-template-rows: auto; }
    .dest-card:first-child { grid-column: 1 / 3; grid-row: auto; }
    .services-grid { grid-template-columns: 1fr; }
    .about-grid { grid-template-columns: 1fr; }
    .pkg-grid { grid-template-columns: 1fr; }
    .contact-grid { grid-template-columns: 1fr; }
    .footer-grid { grid-template-columns: 1fr 1fr; gap: 40px; }
    .form-row { grid-template-columns: 1fr; }
    .about { padding: 70px 24px; }
    .services { padding: 70px 24px; }
    .contact { padding: 70px 24px; }
    footer { padding: 48px 24px; }
    .packages { padding: 70px 24px; }
    .destinations { padding: 70px 24px; }
  }
</style>
</head
